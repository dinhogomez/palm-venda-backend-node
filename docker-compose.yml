version: '3.8'

services:
  api:
    build: .
    container_name: fvendas-api
    ports:
      - "3334:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:&fr1g0?2023:5432/luciana
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - fvendas-network
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: fvendas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: &fr1g0?2023
      POSTGRES_DB: luciana
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fvendas-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fvendas-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: gomez_moraes@outlook.com
      PGADMIN_DEFAULT_PASSWORD: &fr1g0?2023
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - fvendas-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  fvendas-network:
    driver: bridge
